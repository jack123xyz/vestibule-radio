services:
  icecast:
    image: ghcr.io/libretime/icecast:2.4.4
    environment:
      - ICECAST_LOCATION=Vestibule Community Radio
      - ICECAST_HOSTNAME=${ICECAST_HOSTNAME}
      - ICECAST_MAX_CLIENTS=100
      - ICECAST_MAX_SOURCES=2
      - ICECAST_ADMIN_USERNAME=admin
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - ICECAST_RELAY_PASSWORD=${ICECAST_RELAY_PASSWORD}
    ports:
      - "8000:8000"
    restart: unless-stopped

  liquidsoap:
    image: savonet/liquidsoap:v2.4.3
    entrypoint: ["liquidsoap", "/etc/liquidsoap/radio.liq"]
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
    volumes:
      - ./streaming/radio.liq:/etc/liquidsoap/radio.liq:ro
      - ./music:/music:ro
    depends_on:
      - icecast
    restart: unless-stopped
